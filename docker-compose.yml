version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rails_api
    env_file: .env              # вынесите секреты сюда
    environment:
      # пример: DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/1
      CLICKHOUSE_URL: http://clickhouse:8123
      RAILS_ENV: production
      # Puma будет слушать 0.0.0.0, чтобы контейнер принимал запросы извне
      PORT: "3000"
    depends_on:
      redis:
        condition: service_started
      postgresql:
        condition: service_healthy
      clickhouse:
        condition: service_started
    ports:
      - "3000:3000"             # уберите, если будете проксировать через nginx/traefik
    command: >
      bash -c "
        bundle exec rails db:prepare &&
        bundle exec puma -C config/puma.rb
      "
    networks:
      - backend

  redis:
    image: redis:7-alpine
    container_name: redis
    volumes:
      - redis_data:/data
#    ports:
#      - "6379:6379"
    networks:
      - backend

  postgresql:
    image: postgres:15-alpine
    container_name: postgresql
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file: .env
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
#    ports:
#      - "5432:5432"
    networks:
      - backend

  clickhouse:
    image: clickhouse/clickhouse-server:24.4
    container_name: clickhouse
    env_file: .env
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ulimits:                       # ClickHouse требует увеличенных лимитов
      nofile:
        soft: 262144
        hard: 262144
#    ports:
#      - "8123:8123"                # HTTP интерфейс
#      - "9000:9000"                # Native TCP
    networks:
      - backend

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:

networks:
  backend:
    driver: bridge
